<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  />

  <title>더큰코리아 연월차 관리자</title>

  <link rel="stylesheet" href="style.css" />
  <meta name="theme-color" content="#7b1e1e" />
</head>

<body>

<div class="wrap">

  <div class="hero">
    <div class="hero-sub">THE BIG KOREA</div>
    <h1>관리자 승인</h1>
    <p>연월차 신청 승인 / 반려</p>
  </div>

  <div class="card">

    <label>관리자 비밀번호</label>
    <input
      type="password"
      id="adminPw"
      placeholder="관리자 비밀번호"
    />

    <button
      class="submit-btn"
      onclick="loadRequests()"
    >
      신청내역 조회
    </button>

  </div>

  <div id="requestList" class="list"></div>

  <div class="bottom-link">
    <a href="index.html">
      직원 신청 페이지
    </a>
  </div>

</div>

<script src="admin.js"></script>

</body>
</html>
